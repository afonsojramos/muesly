# Dev toolchain, managed by mise (https://mise.jdx.dev).
# `mise install` provisions these; run `mise use node@<v>` etc. to change one.
[tools]
node = "24"
# nub (the Node toolkit, see AGENTS.md) is the installer and script runner across
# every project, CI included (via jdx/mise-action). It reads and writes the
# pnpm-lock.yaml files directly, so pnpm itself is no longer provisioned. Pinned via
# its npm distribution so it travels with the repo, no separate brew/curl install.
"npm:@nubjs/nub" = "0.4.11"
