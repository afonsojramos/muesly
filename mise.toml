# Dev toolchain, managed by mise (https://mise.jdx.dev).
# `mise install` provisions these; run `mise use node@<v>` etc. to change one.
[tools]
node = "24"
# pnpm is a local fallback (nub is the installer everywhere, CI included via
# jdx/mise-action), pinned to 11 through the npm backend since aqua can't fetch its
# renamed macOS assets. pnpm 11's default minimumReleaseAge (~1 day) is a
# supply-chain cooldown matching the ncu cooldown, so a local `pnpm install` rejects
# deps published within the last day; nub (the primary path) doesn't enforce it.
"npm:pnpm" = "11.12.0"
# nub (the Node toolkit — see AGENTS.md) via its npm distribution, so it's
# pinned with the repo instead of a separate brew/curl install.
"npm:@nubjs/nub" = "0.4.11"
