# Dev toolchain, managed by mise (https://mise.jdx.dev).
# `mise install` provisions these; run `mise use node@<v>` etc. to change one.
[tools]
node = "24"
# pnpm is now only a local fallback: nub is the installer everywhere, CI included
# (via jdx/mise-action). Held at 10.33 because pnpm 11 adds a minimumReleaseAge
# supply-chain policy that rejects the current lockfiles' fresh transitive deps (so
# a plain `pnpm install` breaks locally), and it conflicts with nub, which doesn't
# enforce the policy, over the shared lockfile. 11.x also needs the npm backend
# ("npm:pnpm" = "11.12.0"); aqua can't fetch its renamed macOS assets.
pnpm = "10.33.0"
# nub (the Node toolkit — see AGENTS.md) via its npm distribution, so it's
# pinned with the repo instead of a separate brew/curl install.
"npm:@nubjs/nub" = "0.4.11"
