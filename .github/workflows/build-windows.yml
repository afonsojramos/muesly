name: "Build and Test - Windows"

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type"
        required: true
        type: choice
        options:
          - debug
          - release
        default: release
      sign-build:
        description: "Sign the build"
        required: true
        type: boolean
        default: true
      upload-artifacts:
        description: "Upload build artifacts"
        required: true
        type: boolean
        default: true

# Cancel duplicate workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Windows (x64) build. Thin wrapper over the reusable build.yml, which owns the
# Vulkan SDK setup, DigiCert KeyLocker signing, and post-build signature verification.
jobs:
  build-windows:
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      platform: "windows-latest"
      target: "x86_64-pc-windows-msvc"
      build-args: ${{ inputs.build-type == 'debug' && '--debug' || '' }}
      is-debug-build: ${{ inputs.build-type == 'debug' }}
      sign-binaries: ${{ inputs.sign-build }}
      upload-artifacts: ${{ inputs.upload-artifacts }}
      asset-prefix: "muesly-windows"
    secrets: inherit
