name: "Site Check"

on:
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site-check.yml"
      - "PRIVACY_POLICY.md"
      - "TERMS_OF_SERVICE.md"
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site-check.yml"
      - "PRIVACY_POLICY.md"
      - "TERMS_OF_SERVICE.md"

permissions:
  contents: read

concurrency:
  group: site-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup toolchain via mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: nub --cwd site install --frozen-lockfile
      - name: Verify formatting
        run: nub --cwd site run format:check
      - name: Lint
        run: nub --cwd site run lint
      - name: Type check
        run: nub --cwd site run check
      - name: Unit tests
        run: nub --cwd site run test
      - name: Production build
        run: nub --cwd site run build
      - name: Route smoke tests
        run: nub --cwd site run test:smoke
      - name: Dependency audit
        run: nub --cwd site audit --audit-level high
