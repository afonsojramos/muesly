name: "Build and Test - macOS"

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type"
        required: true
        type: choice
        options:
          - debug
          - release
        default: release
      sign-build:
        description: "Sign the build"
        required: true
        type: boolean
        default: true
      upload-artifacts:
        description: "Upload build artifacts"
        required: true
        type: boolean
        default: true

# Cancel duplicate workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# macOS (Apple Silicon) build. Thin wrapper over the reusable build.yml so the
# build/sign/verify steps live in one place.
jobs:
  build-macos:
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      platform: "macos-latest"
      target: "aarch64-apple-darwin"
      build-args: --target aarch64-apple-darwin ${{ inputs.build-type == 'debug' && '--debug' || '' }}
      is-debug-build: ${{ inputs.build-type == 'debug' }}
      sign-binaries: ${{ inputs.sign-build }}
      upload-artifacts: ${{ inputs.upload-artifacts }}
      asset-prefix: "muesly-macos"
    secrets: inherit
