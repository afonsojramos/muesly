name: Frontend Check

on:
  pull_request:
    paths:
      - "app/src-svelte/**"
      - ".github/workflows/frontend-check.yml"
  push:
    branches: [main]
    paths:
      - "app/src-svelte/**"
      - ".github/workflows/frontend-check.yml"

concurrency:
  group: frontend-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check / lint / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src-svelte
    steps:
      - uses: actions/checkout@v5

      - uses: jdx/mise-action@v4

      - name: Cache nub store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nub/store
          key: ${{ runner.os }}-nub-store-${{ hashFiles('app/src-svelte/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-nub-store-

      - name: Install dependencies
        run: nub install --frozen-lockfile

      - name: Typecheck (svelte-check)
        run: nub run check

      - name: Lint
        run: nub run lint

      - name: Unit tests
        run: nub run test
