name: Frontend Check

on:
  pull_request:
    paths:
      - "app/src-svelte/**"
      - ".github/workflows/frontend-check.yml"
  push:
    branches: [main]
    paths:
      - "app/src-svelte/**"
      - ".github/workflows/frontend-check.yml"

concurrency:
  group: frontend-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check / lint / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src-svelte
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/src-svelte/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (svelte-check)
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
