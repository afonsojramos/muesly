name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: migrate + deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      # account_id + auth come from repo secrets, never the committed config.
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: jdx/mise-action@v4

      - name: Cache nub store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nub/store
          key: ${{ runner.os }}-nub-store-${{ hashFiles('api/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-nub-store-

      - name: Install dependencies
        run: nub install --frozen-lockfile

      - name: Apply D1 migrations
        run: nub run db:migrate

      - name: Deploy Worker
        run: nub run release
