name: Eval Harness

# Quality checks against fixed fixtures: the scripts must run AND stay within
# per-fixture WER thresholds (deterministic, so safe to gate). No live model
# output is scored here. Expand fixtures over time.
on:
  pull_request:
    paths:
      - "app/scripts/eval/**"
      - ".github/workflows/eval-harness.yml"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "app/scripts/eval/**"
      - ".github/workflows/eval-harness.yml"
      - "package.json"
  workflow_dispatch:

jobs:
  eval:
    name: WER + rubric dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4
      - name: Corpus manifest and consent policy
        run: |
          nub run eval:corpus:validate
          nub run eval:corpus:test
          nub run eval:coverage:test
          nub run eval:report:test
      - name: Word error rate (short fixture)
        run: |
          nub app/scripts/eval/wer.mjs \
            app/scripts/eval/fixtures/sample-ref.txt \
            app/scripts/eval/fixtures/sample-hyp.txt \
            --max-wer 0
      - name: Word error rate (multi-utterance golden)
        run: |
          nub app/scripts/eval/wer.mjs \
            app/scripts/eval/fixtures/meeting-golden-ref.txt \
            app/scripts/eval/fixtures/meeting-golden-hyp.txt \
            --max-wer 0
          nub app/scripts/eval/wer.mjs \
            app/scripts/eval/fixtures/meeting-golden-ref.txt \
            app/scripts/eval/fixtures/meeting-golden-hyp-noisy.txt \
            --max-wer 10
      - name: Summary rubric (sample markdown)
        run: |
          cat > /tmp/sample-summary.md <<'MD'
          # Summary
          Overview of the meeting.
          ## Decisions
          We agreed on the launch date.
          ## Action items
          - Ship the eval harness
          MD
          nub app/scripts/eval/summary-rubric.mjs /tmp/sample-summary.md
