name: Eval Harness

# Offline gates for corpus custody, evaluator provenance, report/coverage
# contracts, and fixed-fixture quality. Fixture WER thresholds are
# deterministic, so they are safe to gate. No live model output is scored here.
on:
  pull_request:
    paths:
      - "app/scripts/eval/**"
      - "app/src-tauri/examples/transcribe-fixture.rs"
      - "app/src-tauri/src/model_integrity.rs"
      - "app/src-tauri/src/whisper_engine/acceleration.rs"
      - "app/src-tauri/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/eval-harness.yml"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "app/scripts/eval/**"
      - "app/src-tauri/examples/transcribe-fixture.rs"
      - "app/src-tauri/src/model_integrity.rs"
      - "app/src-tauri/src/whisper_engine/acceleration.rs"
      - "app/src-tauri/Cargo.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/eval-harness.yml"
      - "package.json"
  workflow_dispatch:

jobs:
  eval:
    name: Corpus safety + deterministic eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4
      - name: Corpus safety, provenance, and report tests
        run: |
          nub run eval:corpus:validate
          nub run eval:corpus:test
          nub run eval:wer:test
          nub run eval:real:test
          nub run eval:coverage:test
          nub run eval:report:test
      - name: Word error rate (short fixture)
        run: |
          nub app/scripts/eval/wer.ts \
            app/scripts/eval/fixtures/sample-ref.txt \
            app/scripts/eval/fixtures/sample-hyp.txt \
            --max-wer 0
      - name: Word error rate (multi-utterance golden)
        run: |
          nub app/scripts/eval/wer.ts \
            app/scripts/eval/fixtures/meeting-golden-ref.txt \
            app/scripts/eval/fixtures/meeting-golden-hyp.txt \
            --max-wer 0
          nub app/scripts/eval/wer.ts \
            app/scripts/eval/fixtures/meeting-golden-ref.txt \
            app/scripts/eval/fixtures/meeting-golden-hyp-noisy.txt \
            --max-wer 10
      - name: Summary rubric (sample markdown)
        run: |
          cat > /tmp/sample-summary.md <<'MD'
          # Summary
          Overview of the meeting.
          ## Decisions
          We agreed on the launch date.
          ## Action items
          - Ship the eval harness
          MD
          nub app/scripts/eval/summary-rubric.ts /tmp/sample-summary.md

  eval-filesystem-windows:
    name: Corpus lock + result custody (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4
      - name: Windows filesystem custody tests
        run: nub --node --test app/scripts/eval/corpus-benchmark-lock.test.ts app/scripts/eval/corpus-result.test.ts
