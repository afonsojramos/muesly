name: "Deploy Site"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
      - name: Setup toolchain via mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: nub --cwd site install --frozen-lockfile
      - name: Verify formatting
        run: nub --cwd site run format:check
      - name: Lint
        run: nub --cwd site run lint
      - name: Type check
        run: nub --cwd site run check
      - name: Unit tests
        run: nub --cwd site run test
      - name: Production build
        run: nub --cwd site run build
      - name: Route smoke tests
        run: nub --cwd site run test:smoke
      - name: Validate Cloudflare deployment bundle
        run: nub --cwd site exec wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare
        run: nub --cwd site exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
