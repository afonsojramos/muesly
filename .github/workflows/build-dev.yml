name: "Build and Test - Dev"

on:
  workflow_dispatch:
    inputs:
      sign-build:
        description: "Sign the build"
        required: false
        type: boolean
        default: false
      upload-artifacts:
        description: "Upload build artifacts"
        required: false
        type: boolean
        default: true

# Cancel duplicate workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Fast dev/test builds across all platforms. Thin wrapper over the reusable
# build.yml so there is a single source of truth for the build steps.
jobs:
  build-dev:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Apple Silicon only (M1+)
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
          - platform: "ubuntu-22.04" # .deb on 22.04
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04" # AppImage + RPM on 24.04
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: ${{ inputs.sign-build }}
      upload-artifacts: ${{ inputs.upload-artifacts }}
      asset-prefix: "muesly-dev"
    secrets: inherit
