name: "Build and Test - Linux"

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type"
        required: true
        type: choice
        options:
          - debug
          - release
        default: release
      upload-artifacts:
        description: "Upload build artifacts"
        required: true
        type: boolean
        default: true

# Cancel duplicate workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Linux build. Thin wrapper over the reusable build.yml. Builds the standard
# bundle set across both Ubuntu versions: .deb on 22.04, AppImage + RPM on 24.04
# (the AppImage has libwayland-client.so stripped and the packages verified by
# build.yml). Linux has no OS-level code signing, so sign-binaries is false; the
# Tauri updater .sig is still produced by build.yml.
jobs:
  build-linux:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04"
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }} ${{ inputs.build-type == 'debug' && '--debug' || '' }}
      is-debug-build: ${{ inputs.build-type == 'debug' }}
      sign-binaries: false
      upload-artifacts: ${{ inputs.upload-artifacts }}
      asset-prefix: "muesly-linux"
    secrets: inherit
