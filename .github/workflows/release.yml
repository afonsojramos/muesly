name: "Release"

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish after every build and release validation succeeds"
        required: true
        default: false
        type: boolean

# Prevent duplicate releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel releases, fail instead

jobs:
  # STEP 1: Create draft release first
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Fetch all tags

      - name: Validate version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' app/src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Version from tauri.conf.json: $VERSION"

          git fetch --tags
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version must be plain SemVer (X.Y.Z), got: $VERSION"
            exit 1
          fi
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "::error::Tag v${VERSION} already exists. Bump app/src-tauri/tauri.conf.json before releasing."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v9
        with:
          script: |
            const tag = `v${{ steps.get-version.outputs.version }}`
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            })
            const existingDraft = releases.find((release) => release.draft && release.tag_name === tag)
            if (existingDraft) {
              console.log(`Reusing draft release ${existingDraft.id} for ${tag}`)
              const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existingDraft.id,
                per_page: 100
              })
              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                })
              }
              console.log(`Removed ${assets.length} stale assets before rebuilding the draft`)
              return existingDraft.id
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `muesly v${{ steps.get-version.outputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            })
            console.log(`Created draft release with ID: ${data.id}`)
            return data.id

  # STEP 2: Build macOS + Windows and upload directly to the release.
  # macOS is fully signed + notarized. Windows is built unsigned (no DigiCert
  # account): it still gets the Tauri updater signature so auto-update works,
  # it just shows a SmartScreen "unknown publisher" prompt on first install.
  # Set `sign: true` on the Windows entry once DigiCert SM_* secrets exist.
  # Linux is handled separately by the build-linux job below.
  build-all-platforms:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Apple Silicon only (M1 and above)
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
            sign: true
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
            sign: false

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: ${{ matrix.sign }}
      asset-prefix: "muesly"
      upload-artifacts: false  # tauri-action uploads directly to release
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit

  # STEP 2b: Build Linux, strip the AppImage, re-sign it, and wire up auto-update.
  # The bundled libwayland-client.so must be stripped so the app runs on many
  # Wayland hosts, but that rewrite invalidates the build-time updater signature.
  # So we re-sign the stripped AppImage and add a linux-x86_64 entry to latest.json
  # *after* the mac/win matrix has written it (hence the dependency on
  # build-all-platforms). Built on ubuntu-22.04 for broad glibc compatibility, with
  # AVX disabled so binaries run on older / virtualized CPUs.
  build-linux:
    needs: [create-release, build-all-platforms]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      WHISPER_NO_AVX: "ON"
      WHISPER_NO_AVX2: "ON"
      # Sourcemap upload credentials (job-level so beforeBuildCommand inherits
      # them). Empty when the secrets are unset, which skips the upload safely.
      POSTHOG_CLI_TOKEN: ${{ secrets.POSTHOG_CLI_TOKEN }}
      POSTHOG_CLI_ENV_ID: ${{ secrets.POSTHOG_CLI_ENV_ID }}
      POSTHOG_CLI_HOST: https://eu.posthog.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup toolchain via mise (node, pnpm, nub)
        uses: jdx/mise-action@v4

      - name: Get nub store directory
        shell: bash
        run: echo "NUB_STORE=$(nub store path)" >> $GITHUB_ENV

      - name: Cache nub store
        uses: actions/cache@v5
        with:
          path: ${{ env.NUB_STORE }}
          key: ${{ runner.os }}-nub-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nub-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: release-ubuntu-22.04-x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libasound2-dev libopenblas-dev libx11-dev libxtst-dev libxrandr-dev \
            fuse libfuse2

      - name: Install app dependencies
        run: |
          cd app
          # src-svelte is a separate project; install it too or `vite` is
          # missing when tauri-action runs the frontend build.
          nub install
          nub --cwd src-svelte install

      - name: Build llama-helper sidecar
        run: |
          cargo build --release -p llama-helper
          mkdir -p app/src-tauri/binaries
          cp target/release/llama-helper app/src-tauri/binaries/llama-helper-x86_64-unknown-linux-gnu
          cargo build --release -p diarization-helper
          cp target/release/diarization-helper app/src-tauri/binaries/diarization-helper-x86_64-unknown-linux-gnu

      - name: Cache FFmpeg binary
        uses: actions/cache@v5
        with:
          path: app/src-tauri/binaries/ffmpeg-*
          key: ${{ runner.os }}-ffmpeg-${{ hashFiles('app/src-tauri/build.rs', 'app/src-tauri/build/ffmpeg.rs') }}

      - name: Install posthog-cli (sourcemap upload)
        if: ${{ env.POSTHOG_CLI_TOKEN != '' }}
        run: cargo install posthog-cli --locked

      - name: Build Tauri app (deb + AppImage)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Analytics ingest key, baked into the binary at compile time (option_env!).
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          # createUpdaterArtifacts is enabled in tauri.conf.json, so the signing key
          # must be present for the build to succeed. The resulting updater tarball
          # and .sig are intentionally NOT uploaded (Linux is download-only).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tauriScript: nub exec tauri
          # No releaseId: build only, we upload the stripped artifacts ourselves.
          args: --target x86_64-unknown-linux-gnu --features openblas --bundles deb,appimage

      - name: Strip libwayland-client.so from AppImage
        run: |
          APPIMAGE_PATH=$(find target/x86_64-unknown-linux-gnu/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "::error::No AppImage found to process"
            exit 1
          fi
          echo "Processing AppImage: $APPIMAGE_PATH"
          chmod +x "$APPIMAGE_PATH"
          cd "$(dirname "$APPIMAGE_PATH")"
          APPIMAGE_NAME=$(basename "$APPIMAGE_PATH")
          "./$APPIMAGE_NAME" --appimage-extract
          find squashfs-root -name "libwayland-client.so*" -type f -delete
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --no-appstream squashfs-root "$APPIMAGE_NAME"
          rm -rf squashfs-root appimagetool-x86_64.AppImage
          echo "Stripped libwayland-client.so from $APPIMAGE_NAME"

      - name: Re-sign the stripped AppImage for the updater
        # The build-time .sig signed the un-stripped AppImage; regenerate it over the
        # stripped bytes so the updater signature matches what we actually ship. The
        # signer reads the key/password from these env vars (Tauri v2 documented interface).
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APPIMAGE=$(readlink -f "$(find target/x86_64-unknown-linux-gnu/release/bundle/appimage -name '*.AppImage' | head -1)")
          echo "Re-signing $APPIMAGE"
          nub --cwd app exec tauri signer sign "$APPIMAGE"
          test -f "${APPIMAGE}.sig" || { echo "::error::AppImage .sig was not generated"; exit 1; }

      - name: Upload Linux artifacts and add updater entry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          DEB=$(find target/x86_64-unknown-linux-gnu/release/bundle/deb -name "*.deb" | head -1)
          APPIMAGE=$(find target/x86_64-unknown-linux-gnu/release/bundle/appimage -name "*.AppImage" | head -1)
          APPIMAGE_NAME=$(basename "$APPIMAGE")

          cp "$DEB" muesly-linux-x86_64.deb
          cp "$APPIMAGE" muesly-linux-x86_64.AppImage

          echo "Uploading .deb (download), stripped .AppImage + .sig (download + updater)..."
          gh release upload "v${VERSION}" \
            "$DEB" "$APPIMAGE" "${APPIMAGE}.sig" \
            muesly-linux-x86_64.deb muesly-linux-x86_64.AppImage \
            --clobber

          # Add linux-x86_64 to latest.json, which the mac/win matrix already wrote.
          echo "Adding linux-x86_64 to latest.json..."
          gh release download "v${VERSION}" --pattern latest.json --dir manifest --clobber
          if [ ! -f manifest/latest.json ]; then
            echo "::error::latest.json not found on the release; cannot add the linux-x86_64 updater entry"
            exit 1
          fi
          SIG=$(cat "${APPIMAGE}.sig")
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${APPIMAGE_NAME}"
          jq --arg url "$URL" --arg sig "$SIG" \
            '.platforms["linux-x86_64"] = {"signature": $sig, "url": $url}' \
            manifest/latest.json > manifest/latest.json.tmp
          mv manifest/latest.json.tmp manifest/latest.json
          echo "Updated latest.json:"; cat manifest/latest.json
          gh release upload "v${VERSION}" manifest/latest.json --clobber

  # STEP 3: Show release summary
  release-summary:
    needs: [create-release, build-all-platforms, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish stable download names and checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir release-assets public-downloads

          gh release download "v${VERSION}" --dir release-assets \
            --pattern "muesly_*_aarch64.dmg" \
            --pattern "muesly_*_x64-setup.exe" \
            --pattern "muesly-linux-x86_64.deb" \
            --pattern "muesly-linux-x86_64.AppImage" \
            --pattern "latest.json"

          MACOS=$(find release-assets -name 'muesly_*_aarch64.dmg' | head -1)
          WINDOWS=$(find release-assets -name 'muesly_*_x64-setup.exe' | head -1)
          test -f "$MACOS" || { echo "::error::macOS DMG is missing"; exit 1; }
          test -f "$WINDOWS" || { echo "::error::Windows installer is missing"; exit 1; }
          test -f release-assets/muesly-linux-x86_64.deb || { echo "::error::Linux DEB is missing"; exit 1; }
          test -f release-assets/muesly-linux-x86_64.AppImage || { echo "::error::Linux AppImage is missing"; exit 1; }

          cp "$MACOS" public-downloads/muesly-macos-arm64.dmg
          cp "$WINDOWS" public-downloads/muesly-windows-x64-setup.exe
          cp release-assets/muesly-linux-x86_64.deb public-downloads/
          cp release-assets/muesly-linux-x86_64.AppImage public-downloads/

          jq -e '
            .platforms["darwin-aarch64"] and
            .platforms["windows-x86_64"] and
            .platforms["linux-x86_64"]
          ' release-assets/latest.json >/dev/null || {
            echo "::error::latest.json is missing a supported updater platform"
            exit 1
          }

          cd public-downloads
          sha256sum ./* > SHA256SUMS.txt
          gh release upload "v${VERSION}" ./* --clobber

      - name: Get release assets and latest.json
        id: release-info
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          RELEASE_ID="${{ needs.create-release.outputs.release-id }}"

          echo "## Release Assets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List all release assets
          echo "### Files in Release" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          gh api repos/${{ github.repository }}/releases/${RELEASE_ID}/assets --jq '.[] | "\(.name) (\(.size / 1048576 | floor)MB)"' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Download and show latest.json
          echo "### latest.json content" >> $GITHUB_STEP_SUMMARY
          gh release download "v${VERSION}" --pattern "latest.json" --dir . 2>/dev/null || echo "latest.json not yet available"
          if [ -f latest.json ]; then
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat latest.json >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Download links
          echo "### Download Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release page:** https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download all as ZIP:** https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.zip" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "============================================"
          echo "=== Release Created Successfully ==="
          echo "============================================"
          echo "Version: v${{ needs.create-release.outputs.version }}"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"
          echo ""
          echo "Uploaded assets:"
          echo "  - macOS: DMG installer + app.tar.gz (for updater) + .sig"
          echo "  - Windows: MSI + NSIS installers (unsigned publisher; updater-signed) + .sig files"
          echo "  - Linux: .deb + AppImage (stripped, re-signed) + .sig for updater"
          echo "  - Updater manifest: latest.json (mac/win via tauri-action; linux-x86_64 added by build-linux)"
          echo ""
          echo "Next steps:"
          echo "  1. Review the draft release"
          echo "  2. Edit release notes if needed"
          echo "  3. Publish the release when ready"
          echo "============================================"

          # Add to GitHub Step Summary
          echo "## Release Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.create-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** [View Release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Uploaded Assets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Assets |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **macOS** | DMG installer, app.tar.gz (updater), .sig |" >> $GITHUB_STEP_SUMMARY
          echo "| **Windows** | MSI + NSIS installers (unsigned publisher; updater-signed), .sig files |" >> $GITHUB_STEP_SUMMARY
          echo "| **Linux** | .deb, AppImage (stripped + re-signed), .sig |" >> $GITHUB_STEP_SUMMARY
          echo "| **Updater** | latest.json (darwin + windows + linux-x86_64) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. [Review the draft release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "2. Edit release notes if needed" >> $GITHUB_STEP_SUMMARY
          echo "3. Publish the release when ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  # STEP 4: Optionally publish only after every platform and release gate passes.
  # The default workflow behavior remains a draft so the release can be reviewed.
  publish-release:
    if: ${{ inputs.publish }}
    needs: [create-release, release-summary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish validated release
        uses: actions/github-script@v9
        with:
          script: |
            const releaseId = Number(`${{ needs.create-release.outputs.release-id }}`)
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId
            })
            if (!release.draft) {
              core.notice(`Release ${release.tag_name} is already published`)
              return
            }
            const { data: published } = await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false
            })
            core.notice(`Published ${published.tag_name}: ${published.html_url}`)
